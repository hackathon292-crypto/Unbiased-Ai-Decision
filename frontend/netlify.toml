# netlify.toml — Quantum frontend deployment config
# ─────────────────────────────────────────────────
# How to deploy:
#   1. Connect this repo to Netlify (netlify.com → New site → Import from Git)
#   2. Netlify auto-detects this file — no manual config needed
#   3. Add environment variable in Netlify dashboard → Site settings → Env vars:
#        VITE_API_BASE_URL = https://your-render-backend.onrender.com
#   4. Push to main → auto-deploys

[build]
  command = "npm install && npm run build"
  publish = "dist"

# SPA routing — redirect all paths to index.html so React Router handles them
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  # Baked-in at build time — Vite embeds this into the JS bundle.
  # If you rename the Render service, update this URL and redeploy.
  VITE_API_BASE_URL = "https://quantum-ai-backend.onrender.com"
