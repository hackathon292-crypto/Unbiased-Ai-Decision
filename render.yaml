services:
  - type: web
    name: quantum-ai-backend
    env: python
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: pip install -r ../requirements.txt && python ../create_dummy_models.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.5"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MONGO_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false

  - type: static_site
    name: quantum-ai-frontend
    rootDir: frontend
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
