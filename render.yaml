# render.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Render deployment configuration for Quantum – Unbiased AI Decision Platform
#
# How to use:
#   1. Push this repo to GitHub
#   2. Connect GitHub repo to Render (render.com → New → Web Service)
#   3. Render auto-detects this file and configures the service
#   4. Add environment variables in the Render dashboard
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: quantum-ai-backend
    runtime: python
    pythonVersion: "3.11.9"  # Explicit pin (also in .python-version for Render's buildpack)
    region: oregon          # Free tier available in: oregon, frankfurt
    plan: free              # Use "starter" for paid, always-on service

    # ── Build ────────────────────────────────────────────────────────────────
    # Runs from repo root. Installs deps via root requirements.txt shim
    # (which proxies to backend/requirements.txt), then generates dummy model
    # pickles into backend/models/ so the app starts on a fresh clone.
    buildCommand: pip install -r requirements.txt && python create_dummy_models.py

    # ── Start ────────────────────────────────────────────────────────────────
    # cd into backend/ so Python's unqualified imports (hiring.router,
    # utils.*, fairness.*) resolve correctly relative to that package root.
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT

    # ── Health check (Render pings this to confirm the service is alive) ─────
    healthCheckPath: /health

    # ── Environment variables ────────────────────────────────────────────────
    # Set these in the Render dashboard → Environment tab
    # Do NOT hardcode secrets here!
    envVars:
      - key: MONGO_URL
        sync: false          # Set manually in Render dashboard
      - key: FRONTEND_ORIGINS
        sync: false          # Set manually in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.9"

    # ── Auto-deploy on git push ───────────────────────────────────────────────
    autoDeploy: true
