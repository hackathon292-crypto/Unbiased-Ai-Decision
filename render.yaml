# render.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Render deployment configuration for Quantum – Unbiased AI Decision Platform
# ─────────────────────────────────────────────────────────────────────────────

services:
  # 1. Backend Service (FastAPI/Python)
  - type: web
    name: quantum-ai-backend
    env: python
    rootDir: backend
    region: oregon
    plan: free
    # We look one level up (../) for requirements.txt since it's in the root
    buildCommand: pip install -r ../requirements.txt && python ../create_dummy_models.py
    # Start command relative to the backend folder
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.5"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MONGO_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false

  # 2. Frontend Service (React/Vite)
  - type: static_site # <--- CHANGED FROM 'web' TO 'static_site'
    name: quantum-ai-frontend
    env: static
    rootDir: frontend
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist # <--- This will now be accepted
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  
